<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Store | فروشگاه لوکس مد</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">LUMINA</div>
            <ul class="nav-links">
                <li><a href="#home">خانه</a></li>
                <li><a href="#shop">فروشگاه</a></li>
                <li><a href="#about">درباره ما</a></li>
                <li><a href="#contact">تماس</a></li>
            </ul>
            <div class="icons">
                <i class="fas fa-search"></i>
                <i class="fas fa-shopping-cart"></i>
                <i class="fas fa-user"></i>
            </div>
        </nav>
    </header>

    <section id="home" class="hero">
        <div class="hero-content">
            <h1>لوکس ترین انتخاب شما</h1>
            <p>جدیدترین کالکشن بهار ۱۴۰۵</p>
            <a href="#shop" class="btn">خرید کنید</a>
        </div>
    </section>

    <section id="shop" class="products">
        <h2>محصولات ویژه</h2>
        <div class="product-grid">
            <!-- Products will be added via JS or static -->
        </div>
    </section>

    <footer>
        <p>&copy; ۱۴۰۵ Lumina Store - همه حقوق محفوظ است</p>
    </footer>

    <script src="js/script.js"></script>

</html>
